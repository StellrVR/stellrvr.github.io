    <div id="music-player-container">
        <div class="music-player-casing">
            <button id="toggle-button" title="Show/Hide Player">▼</button>
            <div class="music-player">
                <div class="display-panel">
                    <div class="song-info-mask">
                        <div id="song-info-scroller">
                            <span id="song-title">NO DISC</span> - <span id="song-artist">INSERT CASSETTE</span>
                        </div>
                    </div>
                    <div class="viz-bars">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                </div>
                <div class="controls-row">
                    <button id="prev" title="Previous Track" class="tactile-btn">
                        <span>◄◄</span>
                    </button>
                    <button id="play-pause" title="Play/Pause" class="tactile-btn play-btn">
                        <span>▶</span>
                    </button>
                    <button id="next" title="Next Track" class="tactile-btn">
                        <span>►►</span>
                    </button>
                    <button id="shuffle" title="Shuffle Mode" class="tactile-btn small-btn">
                        <span>⤭</span>
                    </button>
                </div>
                <div class="sliders-row">
                    <div class="slider-group">
                        <label for="volume">VOL</label>
                        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.2" title="Volume Control">
                    </div>
                    <span id="volume-label" class="digital-readout">20</span>
                </div>
                <input type="range" id="progress" min="0" max="100" value="0" title="Seek Position" class="tape-progress">
            </div>
        </div>
    </div>
